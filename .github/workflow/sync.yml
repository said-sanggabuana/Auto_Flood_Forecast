name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # ⚠️ CRUCIAL: Replace 'your-actual-hf-username' and 'your-space-name' below!
          git push --force https://huggingface.co/angga-sanggabuana:$HF_TOKEN@huggingface.co/spaces/angga-sanggabuana/katingan-flood-api HEAD:refs/heads/main